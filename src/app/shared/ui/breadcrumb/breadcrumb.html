<div class="site-breadcrumb">
  <div class="container">
    <h1 class="breadcrumb-title">{{ title() }}</h1>
    <ul class="breadcrumb-menu">
      <li><a routerLink="/">Home</a></li>
      @if (title() !== parentLabel()) {
        <li><a [routerLink]="parentLink()">{{ parentLabel() }}</a></li>
      }
      <li class="active">{{ title() }}</li>
    </ul>
  </div>
</div>
