<main class="main"><app-page-hero title="Our Team" />
  <section class="team-area pt-120 pb-90"><div class="container">
    <div class="row"><div class="col-lg-6 mx-auto"><div class="site-heading text-center"><span class="site-title-tagline">Team</span><h2 class="site-title">Meet Our <span>Team</span></h2><div class="heading-divider"></div></div></div></div>
    <div class="row mt-5">@for (member of members; track member.name) {
      <div class="col-md-6 col-lg-3"><article class="team-item wow fadeInUp"><div class="team-img"><img [src]="'assets/img/team/' + member.image" [alt]="member.name" /></div><div class="team-content"><div class="team-bio"><h5>{{ member.name }}</h5><span>{{ member.role }}</span></div></div></article></div>
    }</div>
  </div></section>
</main>
