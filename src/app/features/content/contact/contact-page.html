<main class="main"><app-page-hero title="Contact Us" />
  <section class="contact-area py-120"><div class="container">
    <div class="contact-content"><div class="row">
      <div class="col-md-4"><div class="contact-info"><div class="contact-info-icon"><i class="fal fa-map-location-dot"></i></div><div class="contact-info-content"><h2>Our Location</h2><p>Riyadh, Saudi Arabia</p></div></div></div>
      <div class="col-md-4"><div class="contact-info"><div class="contact-info-icon"><i class="fal fa-envelopes"></i></div><div class="contact-info-content"><h2>Email Us</h2><p>support&#64;sayarahub.com</p></div></div></div>
      <div class="col-md-4"><div class="contact-info"><div class="contact-info-icon"><i class="fal fa-alarm-clock"></i></div><div class="contact-info-content"><h2>Support Hours</h2><p>Sun - Thu (09:00 - 18:00)</p></div></div></div>
    </div></div>
    <div class="contact-wrapper"><div class="row"><div class="col-lg-6 align-self-center"><div class="contact-img"><img src="assets/img/contact/01-v2.jpg" alt="Contact SayaraHub support" /></div></div>
      <div class="col-lg-6 align-self-center"><div class="contact-form"><div class="contact-form-header"><h2>Get In Touch</h2><p>Tell us how we can help. Submitting opens your email application with the message ready to send.</p></div>
        <form [formGroup]="form" (ngSubmit)="send()" novalidate><div class="row"><div class="col-md-6"><div class="form-group"><input type="text" class="form-control" formControlName="name" placeholder="Your Name" aria-label="Your name" /></div></div><div class="col-md-6"><div class="form-group"><input type="email" class="form-control" formControlName="email" placeholder="Your Email" aria-label="Your email" /></div></div></div>
          <div class="form-group"><input type="tel" class="form-control" formControlName="phone" placeholder="Phone Number (optional)" aria-label="Phone number" /></div>
          <div class="form-group"><input type="text" class="form-control" formControlName="subject" placeholder="Your Subject" aria-label="Subject" /></div>
          <div class="form-group"><textarea cols="30" rows="5" class="form-control" formControlName="message" placeholder="Write Your Message" aria-label="Message"></textarea></div>
          <button type="submit" class="theme-btn" [disabled]="openingEmail()">{{ openingEmail() ? 'Opening...' : 'Send Message' }} <i class="far fa-paper-plane"></i></button>
        </form>
      </div></div>
    </div></div>
  </div></section>
</main>
