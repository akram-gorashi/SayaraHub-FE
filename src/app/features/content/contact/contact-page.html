<main class="main"><app-page-hero title="Contact Us" />
  <section class="contact-area py-120"><div class="container">
    <div class="contact-content"><div class="row">
      <div class="col-md-4"><div class="contact-info"><div class="contact-info-icon"><i class="fal fa-map-location-dot"></i></div><div class="contact-info-content"><h2>Our Location</h2><p>Riyadh, Saudi Arabia</p></div></div></div>
      <div class="col-md-4"><div class="contact-info"><div class="contact-info-icon"><i class="fal fa-envelopes"></i></div><div class="contact-info-content"><h2>Email Us</h2><p>support&#64;sayaramatch.com</p></div></div></div>
      <div class="col-md-4"><div class="contact-info"><div class="contact-info-icon"><i class="fal fa-alarm-clock"></i></div><div class="contact-info-content"><h2>Support Hours</h2><p>Sun - Thu (09:00 - 18:00)</p></div></div></div>
    </div></div>
    <div class="contact-wrapper"><div class="row"><div class="col-lg-6 align-self-center"><div class="contact-img"><img src="assets/img/contact/01-v2.jpg" alt="Contact SayaraMatch support" /></div></div>
      <div class="col-lg-6 align-self-center"><div class="contact-form"><div class="contact-form-header"><h2>Get In Touch</h2><p>Tell us how we can help. Submitting opens your email application with the message ready to send.</p></div>
        <form [formGroup]="form" (ngSubmit)="send()" novalidate><div class="row"><div class="col-md-6"><div class="form-group"><input type="text" class="form-control" formControlName="name" [placeholder]="'auth.placeholders.name' | translate" [attr.aria-label]="'auth.placeholders.name' | translate" /></div></div><div class="col-md-6"><div class="form-group"><input type="email" class="form-control" formControlName="email" [placeholder]="'auth.placeholders.email' | translate" [attr.aria-label]="'auth.placeholders.email' | translate" /></div></div></div>
          <div class="form-group"><input type="tel" class="form-control" formControlName="phone" [placeholder]="'contact.phoneOptional' | translate" [attr.aria-label]="'contact.phone' | translate" /></div>
          <div class="form-group"><input type="text" class="form-control" formControlName="subject" [placeholder]="'contact.subject' | translate" [attr.aria-label]="'contact.subject' | translate" /></div>
          <div class="form-group"><textarea cols="30" rows="5" class="form-control" formControlName="message" [placeholder]="'contact.message' | translate" [attr.aria-label]="'contact.message' | translate"></textarea></div>
          <button type="submit" class="theme-btn" [disabled]="openingEmail()">{{ (openingEmail() ? 'contact.opening' : 'contact.send') | translate }} <i class="far fa-paper-plane"></i></button>
        </form>
      </div></div>
    </div></div>
  </div></section>
</main>
