<section class="user-profile-card profile-setting" aria-labelledby="settings-title">
  <h2 id="settings-title" class="user-profile-card-title">Settings</h2>
  @if (store.error(); as error) { <div class="alert alert-danger">{{ error }}</div> }
  @if (store.success(); as success) { <div class="alert alert-success">{{ success }}</div> }
  @if (store.loading()) { <div class="text-center py-5"><span class="spinner-border text-primary"></span></div> }
  @else {
    <div class="row"><div class="col-lg-8"><h3 class="settings-subtitle">Privacy Setting</h3>
      <form [formGroup]="form" (ngSubmit)="save()">
        <div class="form-check form-switch"><input id="enable-messages" class="form-check-input" type="checkbox" role="switch" formControlName="enableMessages" /><label for="enable-messages" class="form-check-label">Enable Messages</label></div>
        <div class="form-check form-switch"><input id="email-notifications" class="form-check-input" type="checkbox" role="switch" formControlName="receiveEmailNotifications" /><label for="email-notifications" class="form-check-label">I Want To Receive Email Notifications</label></div>
        <div class="form-check form-switch"><input id="hide-phone" class="form-check-input" type="checkbox" role="switch" formControlName="hidePhoneNumber" /><label for="hide-phone" class="form-check-label">Hide My Phone Number From Public</label></div>
        <div class="form-check form-switch"><input id="message-notifications" class="form-check-input" type="checkbox" role="switch" formControlName="receiveMessageNotifications" /><label for="message-notifications" class="form-check-label">I Want To Receive Message Notifications</label></div>
        <div class="form-check form-switch"><input id="private-profile" class="form-check-input" type="checkbox" role="switch" formControlName="isProfilePrivate" /><label for="private-profile" class="form-check-label">Make My Profile Private</label></div>
        <button type="submit" class="theme-btn my-4" [disabled]="store.saving()"><i class="far fa-gear"></i> {{ store.saving() ? 'Updating...' : 'Update Settings' }}</button>
      </form>
    </div></div>
  }
</section>
